server {
    listen 80;
    server_name localhost;

    # Página de Vendas (raiz)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # Área de Membros - Login amigável (/login)
    location = /login {
        root /usr/share/nginx/html;
        # Preserva os argumentos originais e redireciona internamente para login.html
        rewrite ^/login$ /areademembros/login.html break;
    }

    # Área de Membros - Dashboard amigável (/dashboard)
    location = /dashboard {
        root /usr/share/nginx/html;
        # Preserva os argumentos originais e redireciona internamente para dashboard.html
        rewrite ^/dashboard$ /areademembros/dashboard.html break;
    }

    # Tratamento genérico para assets da Área de Membros
    location /areademembros/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ =404;
    }

    # Configuração de erro padrão
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
